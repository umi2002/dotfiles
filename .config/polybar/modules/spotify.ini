[module/spotify]
type = custom/script
tail = true
interval = 1
; prefix symbol is shown before the text
format-prefix = ""
format = <label>
exec = ~/.config/polybar/modules/spotify/spotify-script.sh
label-padding = 1

[module/spotify-prev]
type = custom/script
exec = echo "󰙣"
format = <label>
click-left = playerctl previous -p spotify
label-padding = 1

[module/spotify-play-pause]
type = custom/ipc
hook-0 = echo ""
hook-1 = echo ""
initial = 1
click-left = playerctl play-pause -p spotify

[module/spotify-next]
type = custom/script
exec = echo "󰙡"
format = <label>
click-left = playerctl next -p spotify
label-padding = 1
