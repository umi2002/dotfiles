[bar/top]
width = 80%
offset-x = 10%
height = 24pt
radius = 10

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 0

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = MapleMono:style=Bold:size=12;2
font-1 = "JetBrainsMono Nerd Font:style=Normal:size=12;3"
font-2 = "JetBrainsMono Nerd Font:style=Medium:size=9;3"
font-3 = "JetBrainsMono Nerd Font:style=Bold:size=9;3"
font-4 = "JetBrainsMono Nerd Font:style=Italic:size=9;3"
font-5 = "JetBrainsMono Nerd Font:style=Medium Italic:size=9;3"
font-6 = "JetBrainsMono Nerd Font:size=19;5"
font-7 = "Feather:size=10.4;3.5"
font-8 = "Material Icons:size=11;4"
font-9 = "Material Icons Outlined:size=11;4"
font-10 = "Material Icons Round:size=11;4"
font-11 = "Material Icons Sharp:size=11;4"
font-12 = "Material Icons TwoTone:size=11;4"

modules-left = xworkspaces
modules-right = date battery
modules-center = xwindow

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

override-redirect = true

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}
