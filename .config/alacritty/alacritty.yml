# Colors
colors:
  # Primary colors
  primary:
    background: '0x232b39'
    foreground: '0xd0d0d0'

  # Normal colors
  normal:
    black:   '0x282c34'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xabb2bf'

  # Bright colors
  bright:
    black:   '0x3e4452'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xd19a66'
    blue:    '0x61afef'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xd0d0d0'

  # Indexed Colors
  indexed_colors:
    - { index: 16, color: '0xffa07a' }
    - { index: 17, color: '0xbe5046' }

font:
  normal:
    family: Fira Code
  size: 8
